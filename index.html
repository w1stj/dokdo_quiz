<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독도 퀴즈</title>
    <style>
        /* 기본 모바일 앱 스타일 리셋 */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f5f7fa; color: #333; line-height: 1.6; padding: 15px; }
        
        /* 퀴즈 전용 컴팩트 컨테이너 */
        .quiz-container { max-width: 600px; margin: 0 auto; padding-top: 10px; }
        
        /* 오리지널 퀴즈 카드 스타일 */
        .quiz-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e1e8ed; }
        .quiz-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: #777; margin-bottom: 10px; font-weight: bold; }
        .quiz-question { font-size: 1.05rem; font-weight: bold; margin-bottom: 15px; color: #2b5797; text-align: justify; word-break: keep-all; }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; }
        
        /* 보기 버튼 스타일 */
        .option-btn { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 15px; text-align: left; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; color: #444; width: 100%; }
        .option-btn:active { background: #e2e8f0; }
        
        /* 정오답 연출 클래스 */
        .option-btn.correct { background: #d1e7dd; border-color: #a3cfbb; color: #0f5132; font-weight: bold; }
        .option-btn.wrong { background: #f8d7da; border-color: #f5c2c7; color: #842029; }
        
        /* 피드백 해설 상자 */
        .quiz-feedback { margin-top: 15px; padding: 15px; background: #f0f4f8; border-left: 4px solid #2b5797; border-radius: 0 8px 8px 0; display: none; }
        .feedback-title { font-weight: bold; margin-bottom: 5px; font-size: 0.95rem; }
        .feedback-title.correct-text { color: #0f5132; }
        .feedback-title.wrong-text { color: #842029; }
        .feedback-desc { font-size: 0.9rem; color: #555; word-break: keep-all; text-align: justify; }
        
        /* 다음 버튼 */
        .next-quiz-btn { display: none; width: 100%; background: #2b5797; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1rem; margin-top: 15px; cursor: pointer; }
        
        /* 결과창 스타일 */
        .result-container { text-align: center; padding: 30px 10px; }
        .score-display { font-size: 3rem; font-weight: bold; color: #2b5797; margin: 20px 0; }
        .restart-btn { background: #2b5797; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-game-zone">
            <div class="quiz-card">
                <div class="quiz-header">
                    <span id="quiz-progress">문제 1 / 10</span>
                    <span id="quiz-points" style="color:#2b5797;">배점: 10점</span>
                </div>
                <div id="quiz-question" class="quiz-question">질문 텍스트가 들어갑니다.</div>
                <div id="quiz-options" class="quiz-options"></div>
                
                <div id="quiz-feedback" class="quiz-feedback">
                    <div id="feedback-title" class="feedback-title">정답입니다!</div>
                    <div id="feedback-desc" class="feedback-desc">해설 내용</div>
                </div>
            </div>
            <button id="next-btn" class="next-quiz-btn" onclick="nextQuestion()">다음 문제 ➡️</button>
        </div>

        <div id="quiz-result-zone" class="result-container" style="display: none;">
            <h2 style="color: #2b5797; margin-bottom: 10px;">퀴즈 종료!</h2>
            <p>당신의 최종 독도 사랑 점수는?</p>
            <div id="final-score" class="score-display">0점</div>
            <p id="result-comment" style="font-size: 0.95rem; color: #555; padding: 0 10px; word-break: keep-all;">결과 평가 멘트</p>
            <button class="restart-btn" onclick="resetQuiz()">다시 도전하기 🔄</button>
        </div>
    </div>

    <script>
        // 오리지널 HTML에 있던 10문제 데이터 완전 복사
        const quizData = [
            { q: "독도를 구성하는 섬은 총 몇 개 일까요?", options: ["87개", "89개", "91개", "93개", "95개"], answer: 3, points: 8, desc: "독도는 동도, 서도, 그리고 89개의 부속 도서로 구성됩니다." },
            { q: "독도는 몇 년 전에 만들어졌나요?", options: ["400만년 전", "460만년 전", "520만년 전", "580만년 전", "640만년 전"], answer: 2, points: 8, desc: "독도는 약 460만 년 전에 만들어진 화산섬입니다." },
            { q: "다음 중 독도에 대한 내용이 적혀있지 않은 문서는 뭔가요?", options: ["세종실록지리지", "삼국사기", "만국요람", "증보문헌", "사해문서"], answer: 5, points: 12, desc: "사해문서는 성경 관련 문서입니다. 본문 속 고문헌은 세종실록 지리지, 삼국사기, 만기요람, 증보문헌비고 등입니다." },
            { q: "다음 섬 중 독도에 가장 가까운 섬은 뭔가요?", options: ["울릉도", "오륙도", "실미도", "울숙도", "가덕도"], answer: 1, points: 8, desc: "울릉도가 약 87.4km로 독도에 가장 가깝습니다." },
            { q: "현재 독도를 지키는 경찰 집단의 이름은 뭔가요?", options: ["훈련도감", "독도경비대", "독도의용수비대", "독도연안군", "대한독도방위군"], answer: 2, points: 8, desc: "독도는 현재 민간 수호 조직이었던 독도의용수비대에 이어 현재는 독도경비대(경찰)가 지키고 있습니다." },
            { q: "독도 아래 매장된 자원의 이름은 뭘까요?", options: ["심해가스결정체", "메탄 하이드레이트", "해저천연가스광물", "극저온탄소광석", "심해연료층"], answer: 2, points: 10, desc: "독도 아래 매장된 잠재력이 높은 자원의 이름은 메탄 하이드레이트(불타는 얼음)입니다." },
            { q: "일본의 문서 중 독도가 우리나라의 영토임을 인정하는 문서 정보로 틀린(잘못 짝지어진) 것은 뭔가요?", options: ["조선국교제시말내탐서", "원록구병자년 주선주착란 일권지각서", "은주시청합기", "태평관 지령", "관보 제 1716호"], answer: 4, points: 12, desc: "원래 올바른 문서는 '태정관 지령'입니다. 보기 속 태평관은 조선시대 외국의 사신이나 손님을 접대하던 시설 이름이므로 오답입니다." },
            { q: "독도의용수비대가 격퇴한 일본 함선으로 옳은 것은 뭔가요?", options: ["경항공모함 류조", "무장순시선 오키호", "경순양함 센다이", "구축함 후부키", "수상기모함 미즈흐"], answer: 2, points: 12, desc: "독도의용수비대는 1954년 8월 and 11월에 일본의 무장순시선 오키호를 격퇴했습니다. 나머지 함선은 모두 2차 세계대전 중 침몰한 군함입니다." },
            { q: "홍순칠 대장이 1966년 서훈받은 훈장의 이름은 뭔가요?", options: ["국민훈장 무궁화장", "화랑 무공훈장", "청조 근정훈장", "근무공로훈장", "보국훈장 삼일장"], answer: 4, points: 12, desc: "홍순칠 대장은 1966년 근무공로훈장을 서훈받았습니다. 참고로 보국훈장 삼일장은 훨씬 후대인 1996년에 서훈받은 훈장입니다." },
            { q: "독도의용수비대 기념관은 언제 개관했나요?", options: ["2014년 5월", "2014년 8월", "2017년 10월", "2017년 11월", "2018년 9월"], answer: 3, points: 10, desc: "독도의용수비대 기념관은 2014년 8월에 기공식을 개최한 후, 2017년 10월에 정식 개관하였습니다." }
        ];

        let currentIdx = 0; let userScore = 0; let isAnswered = false;
        
        // 퀴즈 초기화 및 시작
        function resetQuiz() { 
            currentIdx = 0; 
            userScore = 0; 
            document.getElementById('quiz-game-zone').style.display = 'block'; 
            document.getElementById('quiz-result-zone').style.display = 'none'; 
            loadQuestion(); 
        }
        
        // 문제 로드 로직 (오리지널 매칭)
        function loadQuestion() {
            isAnswered = false; 
            const currentQuiz = quizData[currentIdx];
            document.getElementById('quiz-progress').innerText = `문제 ${currentIdx + 1} / ${quizData.length}`;
            document.getElementById('quiz-points').innerText = `배점: ${currentQuiz.points}점`;
            document.getElementById('quiz-question').innerText = currentQuiz.q;
            document.getElementById('quiz-feedback').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const optionsContainer = document.getElementById('quiz-options'); 
            optionsContainer.innerHTML = '';
            
            currentQuiz.options.forEach((option, idx) => {
                const btn = document.createElement('button'); 
                btn.className = 'option-btn'; 
                btn.innerText = `（${idx + 1}） ${option}`;
                btn.onclick = () => checkAnswer(idx + 1, btn); 
                optionsContainer.appendChild(btn);
            });
        }

        // 정답 체크 로직 (오리지널 매칭 및 연출)
        function checkAnswer(selectedNum, selectedBtn) {
            if (isAnswered) return; 
            isAnswered = true;
            
            const currentQuiz = quizData[currentIdx]; 
            const feedbackBox = document.getElementById('quiz-feedback');
            const feedbackTitle = document.getElementById('feedback-title'); 
            const feedbackDesc = document.getElementById('feedback-desc');
            const allOptionButtons = document.querySelectorAll('.option-btn');
            
            // 정답 보기 초록색 강조
            allOptionButtons.forEach((btn, idx) => { 
                if (idx + 1 === currentQuiz.answer) btn.classList.add('correct'); 
            });
            
            // 사용자 선택에 따른 연출 변경
            if (selectedNum === currentQuiz.answer) { 
                userScore += currentQuiz.points; 
                feedbackTitle.innerText = "⭕ 정답입니다!"; 
                feedbackTitle.className = "feedback-title correct-text"; 
            } else { 
                selectedBtn.classList.add('wrong'); 
                feedbackTitle.innerText = "❌ 오답입니다."; 
                feedbackTitle.className = "feedback-title wrong-text"; 
            }
            
            feedbackDesc.innerText = currentQuiz.desc; 
            feedbackBox.style.display = 'block'; 
            document.getElementById('next-btn').style.display = 'block';
        }

        // 다음 문제 제어
        function nextQuestion() { 
            currentIdx++; 
            if (currentIdx < quizData.length) { 
                loadQuestion(); 
            } else { 
                showResult(); 
            } 
        }
        
        // 결과 화면 제어 (오리지널 코멘트 매칭)
        function showResult() {
            document.getElementById('quiz-game-zone').style.display = 'none'; 
            document.getElementById('quiz-result-zone').style.display = 'block'; 
            document.getElementById('final-score').innerText = `${userScore}점`;
            
            const comment = document.getElementById('result-comment');
            if (userScore === 100) {
                comment.innerText = "💯 만점 달성! 당신은 완벽한 독도 전문가입니다! 대한민국 독도를 지켜내 주셔서 감사합니다.";
            } else if (userScore >= 70) {
                comment.innerText = "👏 훌륭한 점수입니다! 독도에 대해 지식이 아주 해박하시군요.";
            } else {
                comment.innerText = "📚 아쉽지만 괜찮습니다! 앱의 안내 화면들을 한 번 더 읽어보고 다시 도전해 보세요!";
            }
        }

        // 페이지 로드 시 자동 실행
        resetQuiz();
    </script>
</body>
</html>
